# Riddle Rush — WebSocket Server
# Deploy on Render: https://render.com
#
# 1. Push this repo to GitHub
# 2. In Render Dashboard → "New Blueprint" → connect your GitHub repo
# 3. Render auto-detects this file and deploys the server
# 4. Set VITE_WS_URL in Vercel to https://csau-server.onrender.com

services:
  - type: web
    name: csau-server
    rootDir: server
    env: node
    buildCommand: npm install
    startCommand: tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: CLIENT_ORIGIN
        value: https://csau.vercel.app
      - key: NODE_VERSION
        value: 20
